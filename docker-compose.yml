version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fms_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-fms_db}
      POSTGRES_USER: ${DB_USER:-fms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - fms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fms_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-fms_db}
      DB_USER: ${DB_USER:-fms_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      BACKEND_PORT: ${BACKEND_PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fms.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      ADMIN_NAME: ${ADMIN_NAME:-Sachin}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fms_frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
      REACT_APP_ENV: ${REACT_APP_ENV:-production}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - fms_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  fms_network:
    driver: bridge
